name: Alert Webhook Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: /tmp/alert-state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-
      - name: Check OREF alerts and fire webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STATE_FILE: /tmp/alert-state.json
        run: node scripts/check-alerts.js
      - name: Save alert state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/alert-state.json
          key: alert-state-${{ github.run_id }}
