<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Israel Alert Monitor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span id="last-update"></span>
      <span id="connection-dot" class="status-dot"></span>
    </div>
    <div class="header-right">
      <span class="header-title">Israel Alert Monitor</span>
    </div>
  </header>

  <main>
    <div id="card-view">
      <div id="alert-section" hidden>
        <div class="section-label">
          <span class="count-badge alert-badge" id="alert-count">0</span>
          <span>Active Alerts</span>
        </div>
        <div class="alert-row" id="alert-grid"></div>
      </div>
      <div id="safe-section">
        <div class="section-label safe-label">
          <span class="count-badge safe-badge" id="safe-count">0</span>
          <span>Safe Regions</span>
        </div>
        <div class="safe-pills" id="safe-grid"></div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
