<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Israel Alert Monitor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span id="last-update"></span>
      <span id="connection-dot" class="status-dot"></span>
    </div>
    <div class="header-right">
      <button id="notify-btn" class="notify-btn" title="Enable notifications"></button>
      <span class="header-title">Israel Alert Monitor</span>
    </div>
  </header>

  <main>
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">Fetching alerts...</div>
    </div>
    <div id="card-view" hidden>
      <div id="alert-section" hidden>
        <div class="section-label">
          <span class="count-badge alert-badge" id="alert-count">0</span>
          <span>Active Alerts</span>
        </div>
        <div class="alert-row" id="alert-grid"></div>
      </div>
      <div id="safe-section">
        <div class="section-label safe-label">
          <span class="count-badge safe-badge" id="safe-count">0</span>
          <span>Safe Regions</span>
        </div>
        <div class="safe-pills" id="safe-grid"></div>
      </div>
      <div id="event-log-section">
        <button id="event-log-toggle" class="event-log-toggle">Event Log &#x25BC;</button>
        <div id="event-log-list" class="event-log-list" hidden></div>
      </div>
      <div id="webhook-section" class="webhook-section">
        <button id="webhook-toggle" class="event-log-toggle">Webhook Settings &#x25BC;</button>
        <div id="webhook-settings" class="webhook-settings" hidden>
          <div class="webhook-input-row">
            <input type="url" id="webhook-url" class="webhook-input" placeholder="Slack webhook URL (https://hooks.slack.com/...)" />
            <button id="webhook-save" class="webhook-save-btn">Save</button>
            <button id="webhook-test" class="webhook-test-btn">Test</button>
          </div>
          <div id="webhook-status" class="webhook-status"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
